<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkpoint — Editar Perfil</title>
  <link rel="icon" href="img/icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/perfil.css">
</head>
<body>

  <header class="barra-superior">
    <div class="container-header">
      <div class="lado-esquerdo">
        <a href="menu_inicial.html" class="link-logo" onclick="voltarSuave(event, this.href)">
          <div class="logo">CHECKPOINT</div>
        </a>
      </div>
      <div class="area-usuario" onclick="alternarMenu(event)">
        <div class="icone-perfil">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
        </div>
        <div class="menu-suspenso" id="menuUsuario">
          <a href="menu_inicial.html">🏠 Home</a>
          <a href="meu_perfil.html">👤 Perfil</a>
          <a href="meus_roles.html">🎉 Rolês</a>
          <a href="central.html">💸 Gastos</a>
          <a href="/users/logout" style="color:#f87171">↩ Sair</a>
        </div>
      </div>
    </div>
  </header>

  <main class="conteudo-principal">
    <div class="container">
      <div class="box-editar-perfil">

        <div class="cabecalho-box">
          <h2>Editar Perfil</h2>
        </div>

        <div class="conteudo-box">

          <!-- FOTO -->
          <div class="area-foto-perfil">
            <div class="foto-perfil-wrapper">
              <div class="foto-perfil" id="preview-foto"></div>
              <div class="icone-perfil-default" id="iconePadrao">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="60px" height="60px">
                  <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
                </svg>
              </div>
            </div>
            <input type="file" id="input-foto" accept="image/*" style="display:none">
            <div class="botoes-foto">
              <button class="btn-alterar-foto" onclick="document.getElementById('input-foto').click(); return false;">Alterar foto</button>
              <button class="btn-remover-foto" id="btnRemoverFoto">Remover foto</button>
            </div>
          </div>

          <!-- FORMULÁRIO -->
          <form action="/users/editar_perfil" method="POST" class="formulario-edicao" id="formCadastro">

            <div class="campo-formulario">
              <label>Apelido (Nick)</label>
              <input type="text" id="nick" name="Nick" class="input-text">
            </div>

            <div class="campo-formulario">
              <label>Nome completo</label>
              <input type="text" id="nome" name="Nome" class="input-text">
            </div>

            <div class="campo-formulario">
              <label>Idade</label>
              <input type="number" id="Idade" name="Idade" class="input-text" min="1" max="120">
            </div>

            <div class="campo-formulario">
              <label>Saldo (R$)</label>
              <div class="campo-moeda">
                <span class="prefixo">R$</span>
                <input type="text" id="Renda" name="Valor" class="input-moeda">
              </div>
            </div>

            <div class="campo-formulario">
              <label>E-mail</label>
              <input type="email" id="email" name="email" class="input-text">
            </div>

            <div class="campo-formulario">
              <label>Nova senha</label>
              <input type="password" id="senha" name="senha" placeholder="Deixe em branco para não alterar" class="input-text">
            </div>

            <div class="campo-formulario">
              <label>Confirmar nova senha</label>
              <input type="password" id="confirmar-senha" name="confirmar-senha" placeholder="Repita a nova senha" class="input-text">
            </div>

            <div class="acoes-formulario">
              <a href="meu_perfil.html" class="btn-cancelar">Cancelar</a>
              <button type="submit" class="btn-salvar">Salvar alterações</button>
            </div>

          </form>
        </div>
      </div>
    </div>
  </main>

  <script>
    window.addEventListener('load', () => { verificarSessao(); });

    function verificarSessao() {
      fetch('/users/sessao')
        .then(r => r.json())
        .then(data => {
          if (data.logado) {
            const u = data.usuario;
            if (document.getElementById('nick')) document.getElementById('nick').value = u.Nick || '';
            if (document.getElementById('email')) document.getElementById('email').value = u.email || '';
            if (document.getElementById('nome')) document.getElementById('nome').value = u.Nome || '';
            if (document.getElementById('Idade')) document.getElementById('Idade').value = u.Idade || '';
            if (document.getElementById('Renda')) document.getElementById('Renda').value = u.Valor || '';
          } else {
            window.location.href = 'index.html';
          }
        })
        .catch(err => console.error(err));
    }

    // Foto
    document.getElementById('input-foto').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(ev) {
        document.getElementById('preview-foto').style.backgroundImage = `url('${ev.target.result}')`;
        document.getElementById('iconePadrao').style.display = 'none';
      };
      reader.readAsDataURL(file);
      enviarFoto(file);
    });

    document.getElementById('btnRemoverFoto').addEventListener('click', () => {
      document.getElementById('preview-foto').style.backgroundImage = 'none';
      document.getElementById('iconePadrao').style.display = 'block';
      document.getElementById('input-foto').value = '';
    });

    function enviarFoto(file) {
      const fd = new FormData();
      fd.append('foto', file);
      fetch('/upload_foto', { method: 'POST', body: fd })
        .then(r => r.json())
        .catch(err => console.error(err));
    }

    document.getElementById('formCadastro').addEventListener('submit', function(e) {
      const senha = document.getElementById('senha').value;
      const csenha = document.getElementById('confirmar-senha').value;
      if (senha && senha !== csenha) {
        e.preventDefault();
        alert('As senhas não coincidem!');
        return;
      }
      if (senha && senha.length < 6) {
        e.preventDefault();
        alert('A senha deve ter pelo menos 6 caracteres.');
        return;
      }
    });

    function alternarMenu(event) {
      if (event) event.stopPropagation();
      document.getElementById('menuUsuario').classList.toggle('mostrar');
    }
  </script>

</body>
</html>
