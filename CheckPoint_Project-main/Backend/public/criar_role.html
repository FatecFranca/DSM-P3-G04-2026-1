<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkpoint — Criar Rolê</title>
  <link rel="icon" href="img/icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/criar_role.css">
</head>
<body>

  <header class="barra-superior">
    <div class="container-header">
      <div class="lado-esquerdo">
     
        <a href="menu_inicial.html" class="link-logo" onclick="voltarSuave(event, this.href)">
          <div class="logo">CHECKPOINT</div>
        </a>
      </div>
      <div class="area-usuario" onclick="alternarMenu(event)">
        <div class="icone-perfil">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
        </div>
        <div class="texto-usuario">
          <span class="ola-pequeno">Olá</span>
          <span class="nome-grande" id="nome-usuario">Usuário</span>
        </div>
        <div class="menu-suspenso" id="menuUsuario">
          <a href="menu_inicial.html">🏠 Home</a>
          <a href="meu_perfil.html">👤 Perfil</a>
          <a href="meus_roles.html">🎉 Rolês</a>
          <a href="central.html">💸 Gastos</a>
          <a href="/users/logout" style="color:#f87171">↩ Sair</a>
        </div>
      </div>
    </div>
  </header>

  <main class="main-criar-role">
    <div class="container-formulario">
      <h1 class="titulo-criar">Criar <span>Rolê</span></h1>

      <div class="form-grid">

        <!-- COLUNA ESQUERDA -->
        <div class="coluna">
          <div class="campo-grupo">
            <label>Nome do evento</label>
            <input type="text" id="input-nome" class="input-padrao" placeholder="Ex: Churrasco na praia">
          </div>

          <div class="campo-grupo">
            <label>Local</label>
            <input type="text" id="input-local" class="input-padrao" placeholder="Ex: Casa do João">
          </div>

          <div class="campo-grupo">
            <label>Número de pessoas</label>
            <input type="number" id="input-quantidade" class="input-padrao" placeholder="1" min="1">
          </div>

          <div class="campo-grupo">
            <label>Convidar amigos (opcional)</label>
            <div id="lista-amigos-convite" class="lista-amigos-check">
              <p style="font-size:0.8rem;color:rgba(255,255,255,0.3);padding:4px 0;">Carregando amigos...</p>
            </div>
          </div>
        </div>

        <!-- COLUNA DIREITA -->
        <div class="coluna">
          <div class="campo-grupo">
            <label>Data do rolê</label>
            <input type="date" id="input-data" class="input-padrao" min="1900-01-01" max="2100-12-31">
          </div>

          <div class="campo-grupo">
            <label>Investimento inicial</label>
            <input type="text" id="input-valor" class="input-padrao" placeholder="R$ 0,00">
          </div>

          <div class="area-desenho">
            <img src="img/amigos-felizes.png" alt="Amigos comemorando" class="img-fantasmas">
          </div>
        </div>

      </div>

      <div class="area-botao">
        <button class="btn-finalizar" onclick="abrirModalHorario(event)">Finalizar</button>
      </div>
    </div>
  </main>

  <!-- MODAL HORÁRIO -->
  <div id="meuModal" class="modal-fundo">
    <div class="modal-caixa">
      <h3>Que horas vai ser? 🕐</h3>
      <input type="time" id="input-hora" class="input-horario-gigante">
      <div class="botoes-modal">
        <button class="btn-voltar-modal" onclick="apenasFecharModal()">Voltar</button>
        <button class="btn-continuar" onclick="finalizarRealmente()">Confirmar</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/criar_role.js"></script>

</body>
</html>
