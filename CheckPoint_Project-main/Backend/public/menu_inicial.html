<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkpoint — Home</title>
  <link rel="icon" href="img/icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/menu_inicial.css">
</head>
<body>

  <header class="barra-superior">
    <div class="container-header">
      <div class="lado-esquerdo">
        <div class="logo">CHECKPOINT</div>
      </div>

      <div class="area-usuario" onclick="alternarMenu(event)">
        <div class="icone-perfil">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
          </svg>
        </div>
        <div class="texto-usuario">
          <span class="ola-pequeno">Olá</span>
          <span class="nome-grande" id="nome-usuario">Usuário</span>
        </div>
        <div class="menu-suspenso" id="menuUsuario">
          <a href="menu_inicial.html">🏠 Home</a>
          <a href="meu_perfil.html">👤 Perfil</a>
          <a href="meus_roles.html">🎉 Rolês</a>
          <a href="central.html">💸 Gastos</a>
          <a href="/users/logout" style="color:#f87171">↩ Sair</a>
        </div>
      </div>
    </div>
  </header>

  <!-- HERO -->
  <section class="secao-boas-vindas">
    <div class="conteudo-banner">
      <h1>Partiu marcar um rolê<br><span>com a galera?</span></h1>
      <a href="criar_role.html">
        <button class="botao-criar-role">+ Criar rolê</button>
      </a>
    </div>
  </section>

  <!-- CARDS -->
  <main class="conteudo-principal">
    <div class="container-cards">

      <div class="card-informativo">
        <h2>Saldo disponível</h2>
        <p class="valor-destaque" id="textoSaldo">R$ 0,00</p>
        <button class="botao-card" onclick="abrirModalSaldo(event)">Atualizar saldo</button>
      </div>

      <div class="card-informativo">
        <h2>Rolês marcados</h2>
        <p class="valor-destaque" id="qtd-roles">0</p>
        <button class="botao-card" onclick="window.location.href='meus_roles.html'">Ver todos</button>
      </div>

      <div id="amigos">
        <div class="container-amigos">
          <h3>Lista de amigos</h3>
          <button class="botao-card" onclick="abrirModalAmigos(event)">Abrir social</button>
        </div>
      </div>

    </div>
  </main>

  <!-- STATUS FINANCEIRO -->
  <footer class="rodape-status">
    <div class="container-status-caixa">
      <div class="personagem-wrapper">
        <img src="/img/logo.png" alt="Status" class="img-status-boneco">
      </div>
      <div class="semaforo-caixa">
        <div id="luz-vermelha" class="luz-moderna vermelha"></div>
        <div id="luz-amarela" class="luz-moderna amarela"></div>
        <div id="luz-verde" class="luz-moderna verde"></div>
      </div>
      <div class="status-info">
        <span class="label-status">Status financeiro</span>
        <h2 id="texto-status">Carregando...</h2>
      </div>
    </div>
  </footer>

  <!-- MODAL SALDO -->
  <div id="modalSaldo" class="modal-fundo">
    <div class="card-informativo" style="max-width:380px;width:90%;padding:36px;border-radius:24px;background:#130a2e;border-color:rgba(139,92,246,0.3);">
      <h3 style="font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;margin-bottom:20px;text-align:center;">Definir orçamento mensal</h3>
      <input type="text" id="input-novo-saldo" placeholder="R$ 0,00" oninput="formatarMoeda(this)" style="width:100%;background:rgba(255,255,255,0.04);border:2px solid rgba(255,255,255,0.1);border-radius:12px;padding:16px;font-size:1.8rem;font-weight:800;color:#a78bfa;text-align:center;outline:none;color-scheme:dark;margin-bottom:20px;">
      <div class="botoes-modal" style="width:100%;">
        <button class="btn-voltar-modal" onclick="fecharModalSaldo()">Cancelar</button>
        <button class="btn-continuar" onclick="salvarNovoSaldo()">Salvar</button>
      </div>
    </div>
  </div>

  <!-- MODAL AMIGOS -->
  <div id="modalAmigos" class="modal-fundo">
    <div class="modal-caixa-amigos">
      <div class="modal-header">
        <h3>Social Checkpoint</h3>
        <button class="btn-fechar-modal" onclick="fecharModalAmigos()">×</button>
      </div>
      <div class="busca-container">
        <input type="text" id="inputBuscaAmigo" placeholder="Buscar por apelido..." oninput="buscarAmigos()">
      </div>
      <div class="abas-social">
        <button class="aba-btn ativa" onclick="mudarAba('buscar')">Buscar</button>
        <button class="aba-btn" onclick="mudarAba('pedidos')">Pedidos</button>
        <button class="aba-btn" onclick="mudarAba('meus-amigos')">Meus Amigos</button>
      </div>
      <div id="listaSocial" class="lista-social-scroll">
        <p class="msg-vazio">Digite um nome para buscar pessoas...</p>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>

</body>
</html>
