<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkpoint — Meu Perfil</title>
  <link rel="icon" href="img/icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/perfil.css">
</head>
<body>

  <header class="barra-superior">
    <div class="container-header">
      <div class="lado-esquerdo">
   
          <a href="menu_inicial.html" class="link-logo" onclick="voltarSuave(event, this.href)">
          <div class="logo">CHECKPOINT</div>
        </a>
      </div>
      <div class="area-usuario" onclick="alternarMenu(event)">
        <div class="icone-perfil">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
        </div>
        <div class="menu-suspenso" id="menuUsuario">
          <a href="menu_inicial.html">🏠 Home</a>
          <a href="meu_perfil.html">👤 Perfil</a>
          <a href="meus_roles.html">🎉 Rolês</a>
          <a href="central.html">💸 Gastos</a>
          <a href="/users/logout" style="color:#f87171">↩ Sair</a>
        </div>
      </div>
    </div>
  </header>

  <main class="conteudo-principal">
    <div class="container">
      <div class="perfil-box">

        <div class="cabecalho-box">
          <h2>Meu Perfil</h2>
        </div>

        <div class="conteudo-box">

          <!-- FOTO -->
          <div class="foto-area">
            <div class="foto-perfil-wrapper">
              <div class="foto-perfil" id="fotoPerfil"></div>
              <div class="icone-perfil-default" id="iconePadrao">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="60px" height="60px">
                  <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
                </svg>
              </div>
            </div>
          </div>

          <!-- DADOS -->
          <div class="dados-usuario">
            <div class="item-dado">
              <span class="label">Apelido</span>
              <span id="campoNick" class="valor">—</span>
            </div>
            <div class="item-dado">
              <span class="label">Nome</span>
              <span id="campoNome" class="valor">—</span>
            </div>
            <div class="item-dado">
              <span class="label">Email</span>
              <span id="campoEmail" class="valor">—</span>
            </div>
            <div class="item-dado">
              <span class="label">Idade</span>
              <span id="campoIdade" class="valor">—</span>
            </div>
          </div>

          <!-- BOTÕES -->
          <div class="grupo-botoes">
            <a href="menu_inicial.html" class="btn-cancelar">← Voltar</a>
            <a href="editar_perfil.html" class="btn-editar">Editar perfil</a>
            <a href="/users/logout" class="btn-editar" style="background:rgba(239,68,68,0.15);color:#fca5a5;border:1px solid rgba(239,68,68,0.3);box-shadow:none;">Sair</a>
          </div>

        </div>
      </div>
    </div>
  </main>

  <script>
    window.addEventListener('load', () => { verificarSessao(); });

    function verificarSessao() {
      fetch('/users/sessao')
        .then(r => r.json())
        .then(data => {
          if (data.logado) {
            const campos = {
              campoNick: data.usuario.Nick,
              campoEmail: data.usuario.email,
              campoNome: data.usuario.Nome,
              campoIdade: data.usuario.Idade
            };
            Object.entries(campos).forEach(([id, val]) => {
              const el = document.getElementById(id);
              if (el) el.innerText = val || '—';
            });
            if (data.usuario.foto) {
              document.getElementById('fotoPerfil').style.backgroundImage = `url('${data.usuario.foto}')`;
              document.getElementById('iconePadrao').style.display = 'none';
            }
          } else {
            window.location.href = 'index.html';
          }
        })
        .catch(err => console.error(err));
    }

    function alternarMenu(event) {
      if (event) event.stopPropagation();
      document.getElementById('menuUsuario').classList.toggle('mostrar');
    }

    document.addEventListener('click', () => {
      document.getElementById('menuUsuario').classList.remove('mostrar');
    });
  </script>

</body>
</html>
