<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkpoint — Login</title>
  <link rel="icon" href="img/icon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --purple-900: #0d0720;
      --purple-800: #130a2e;
      --purple-700: #1c0f42;
      --accent:        #8b5cf6;
      --accent-glow:   rgba(139, 92, 246, 0.35);
      --accent-bright: #a78bfa;
      --glass-border:  rgba(255,255,255,0.08);
      --gray-400: #a3a3a3;
      --gray-500: #737373;
      --red-soft:  rgba(239,68,68,0.10);
      --red-border:rgba(239,68,68,0.30);
      --font-display: 'Syne', sans-serif;
      --font-body:    'DM Sans', sans-serif;
    }

    body {
      font-family: var(--font-body);
      background: var(--purple-900);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    /* ── BLOBS ── */
    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }
    .bg-blob-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(139,92,246,.18) 0%, transparent 70%);
      top: -150px; left: -150px;
    }
    .bg-blob-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(74,31,170,.15) 0%, transparent 70%);
      bottom: -100px; right: -100px;
    }

    /* ── CARD ── */
    .card-login {
      position: relative;
      z-index: 1;
      display: flex;
      width: 100%;
      max-width: 900px;
      min-height: 560px;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,.6), 0 0 60px rgba(139,92,246,.1);
      animation: slideUp .5s cubic-bezier(.16,1,.3,1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── LADO ESQUERDO ── */
    .lado-esquerdo {
      width: 45%;
      background: linear-gradient(135deg, #1c0f42 0%, #0d0720 60%, #130a2e 100%);
      padding: 48px 40px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }

    .lado-esquerdo::before {
      content: '';
      position: absolute;
      width: 280px; height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(139,92,246,.2) 0%, transparent 70%);
      bottom: -60px; right: -60px;
    }

    .lado-esquerdo::after {
      content: '';
      position: absolute;
      width: 180px; height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(139,92,246,.12) 0%, transparent 70%);
      top: 40px; right: 20px;
    }

    .logo-login {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: .85rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(167,139,250,.7);
    }

    .headline {
      position: relative;
      z-index: 2;
    }

    .headline h1 {
      font-family: var(--font-display);
      font-size: 3rem;
      font-weight: 800;
      line-height: 1.05;
      color: #fff;
      margin-bottom: 20px;
    }

    .headline h1 span { color: var(--accent-bright); }

    .headline p {
      font-size: .9rem;
      color: rgba(255,255,255,.45);
      line-height: 1.6;
      max-width: 280px;
    }

    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      position: relative;
      z-index: 2;
    }

    .pill {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: .75rem;
      color: rgba(255,255,255,.5);
      font-weight: 500;
    }

    /* ── LADO DIREITO ── */
    .lado-direito {
      flex: 1;
      background: rgba(19,10,46,.95);
      backdrop-filter: blur(20px);
      padding: 48px 44px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .form-titulo {
      margin-bottom: 28px;
    }

    .form-titulo h2 {
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
    }

    .form-titulo p {
      font-size: .875rem;
      color: var(--gray-500);
    }

    /* ── ERRO (mostrar via backend: remover display:none) ── */
    .erro-msg {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--red-soft);
      border: 1px solid var(--red-border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: .82rem;
      color: #fca5a5;
      margin-bottom: 18px;
      animation: slideUp .3s ease;
    }

    /* ── CAMPOS ── */
    .campo { margin-bottom: 18px; }

    .campo label {
      display: block;
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--gray-400);
      margin-bottom: 8px;
    }

    .campo-input { position: relative; }

    .campo-input input {
      width: 100%;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      padding: 13px 16px;
      font-size: .95rem;
      color: #fff;
      outline: none;
      transition: all .2s ease;
      font-family: var(--font-body);
    }

    .campo-input input.has-toggle { padding-right: 44px; }

    .campo-input input:focus {
      border-color: var(--accent);
      background: rgba(139,92,246,.06);
      box-shadow: 0 0 0 3px rgba(139,92,246,.15);
    }

    .campo-input input::placeholder { color: rgba(255,255,255,.2); }

    /* ── BOTÃO OLHO ── */
    .btn-olho {
      position: absolute;
      right: 13px; top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--gray-500);
      cursor: pointer;
      padding: 4px;
      transition: color .2s;
      display: flex;
      align-items: center;
    }

    .btn-olho:hover { color: var(--accent-bright); }
    .btn-olho svg   { width: 18px; height: 18px; }

    /* ── ESQUECEU ── */
    .link-esqueceu {
      text-align: right;
      margin-top: -10px;
      margin-bottom: 22px;
    }

    .link-esqueceu a {
      font-size: .8rem;
      color: var(--accent-bright);
      text-decoration: none;
      transition: opacity .2s;
    }
    .link-esqueceu a:hover { opacity: .7; }

    /* ── BOTÃO ENTRAR ── */
    .btn-entrar {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-size: .9rem;
      font-weight: 700;
      font-family: var(--font-body);
      letter-spacing: .5px;
      cursor: pointer;
      transition: all .25s ease;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }

    .btn-entrar::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.1) 0%, transparent 100%);
      opacity: 0;
      transition: opacity .2s;
    }

    .btn-entrar:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px var(--accent-glow);
    }

    .btn-entrar:hover::before { opacity: 1; }
    .btn-entrar:active { transform: translateY(0); }

    /* ── DIVISOR ── */
    .divisor {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
      color: rgba(255,255,255,.15);
      font-size: .75rem;
    }

    .divisor::before, .divisor::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,.08);
    }

    /* ── SOCIAL ── */
    .social-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 28px;
    }

    .btn-social {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 44px;
      border-radius: 10px;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--glass-border);
      transition: all .2s ease;
      color: var(--gray-400);
      text-decoration: none;
    }

    .btn-social:hover {
      background: rgba(255,255,255,.08);
      border-color: rgba(255,255,255,.15);
      transform: translateY(-2px);
    }

    .btn-social svg { width: 18px; height: 18px; }

    /* ── CRIAR CONTA ── */
    .criar-conta {
      text-align: center;
      font-size: .85rem;
      color: var(--gray-500);
    }

    .criar-conta a {
      color: var(--accent-bright);
      font-weight: 600;
      text-decoration: none;
      transition: opacity .2s;
    }

    .criar-conta a:hover { opacity: .7; }

    /* ══════════════════════════════════════════
       RESPONSIVIDADE
    ══════════════════════════════════════════ */

    /* Tablet */
    @media (min-width: 768px) and (max-width: 1023px) {
      body { padding: 1.5rem; align-items: flex-start; padding-top: 3rem; }

      .card-login { border-radius: 20px; min-height: 520px; }

      .lado-esquerdo {
        width: 38%;
        padding: 36px 28px;
      }

      .headline h1 { font-size: 2.4rem; }

      .lado-direito { padding: 40px 32px; }

      .form-titulo h2 { font-size: 1.5rem; }
    }

    /* Mobile */
    @media (max-width: 767px) {
      body {
        padding: 0;
        align-items: flex-start;
        background: #130a2e;
        overflow-y: auto;
      }

      .bg-blob-1, .bg-blob-2 { display: none; }

      .card-login {
        border-radius: 0;
        min-height: 100dvh;
        flex-direction: column;
        box-shadow: none;
      }

      .lado-esquerdo { display: none; }

      .lado-direito {
        padding: 64px 28px 48px;
        min-height: 100dvh;
        justify-content: flex-start;
        background: #130a2e;
      }

      /* Logo mobile */
      .lado-direito::before {
        content: 'CHECKPOINT';
        display: block;
        font-family: var(--font-display);
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 5px;
        color: var(--accent-bright);
        opacity: .7;
        margin-bottom: 32px;
      }

      .form-titulo h2 { font-size: 1.6rem; }

      .campo-input input { padding: 14px 16px; font-size: 1rem; }
      .campo-input input.has-toggle { padding-right: 44px; }

      .btn-entrar { padding: 15px; font-size: .95rem; }

      .social-grid { gap: 8px; }
    }

    /* Mobile pequeno */
    @media (max-width: 400px) {
      .lado-direito { padding: 60px 20px 40px; }
      .form-titulo h2 { font-size: 1.4rem; }
      .social-grid { grid-template-columns: repeat(2, 1fr); }
    }

    /* Landscape mobile */
    @media (max-width: 767px) and (max-height: 600px) {
      .lado-direito { padding: 44px 28px 40px; min-height: unset; }
      .campo { margin-bottom: 14px; }
      .form-titulo { margin-bottom: 20px; }
    }
  </style>
</head>
<body>

<div class="bg-blob bg-blob-1"></div>
<div class="bg-blob bg-blob-2"></div>

<div class="card-login">

  <!-- ── ESQUERDA ── -->
  <div class="lado-esquerdo">
    <div class="logo-login">Checkpoint</div>

    <div class="headline">
      <h1>Bem<br>vindo<br>de <span>volta.</span></h1>
      <p>Organize seus rolês, gerencie gastos e fique em dia com a galera.</p>
    </div>

    <div class="pills">
      <span class="pill">🎉 Criar rolê</span>
      <span class="pill">💸 Dividir gastos</span>
      <span class="pill">👥 Amigos</span>
    </div>
  </div>

  <!-- ── DIREITA ── -->
  <div class="lado-direito">

    <div class="form-titulo">
      <h2>Fazer login</h2>
      <p>Acesse sua conta para continuar</p>
    </div>

    <!--
      ERRO DE LOGIN:
      Quando o backend retornar credenciais inválidas,
      adicione a classe "show" ou remova o display:none abaixo.
    -->
    <div class="erro-msg" id="erroLogin">
      ⚠ Apelido ou senha incorretos.
    </div>

    <form action="/users/login" method="POST">

      <div class="campo">
        <label for="username">Apelido</label>
        <div class="campo-input">
          <input
            type="text"
            id="username"
            name="Nick"
            placeholder="seu_apelido"
            autocomplete="username"
            required
          >
        </div>
      </div>

      <div class="campo">
        <label for="inputSenha">Senha</label>
        <div class="campo-input">
          <input
            type="password"
            id="inputSenha"
            name="senha"
            placeholder="••••••••"
            autocomplete="current-password"
            class="has-toggle"
            required
          >
          <button type="button" class="btn-olho" onclick="toggleSenha()" title="Mostrar/ocultar senha" aria-label="Mostrar senha">
            <svg id="iconOlho" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="link-esqueceu">
        <a href="recuperar.html">Esqueceu a senha?</a>
      </div>

      <button type="submit" class="btn-entrar">Entrar</button>

    </form>

    <div class="divisor">ou continue com</div>

    <div class="social-grid">
      <!-- Google -->
      <a href="#" class="btn-social" title="Google">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
      </a>
      <!-- GitHub -->
      <a href="#" class="btn-social" title="GitHub">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
        </svg>
      </a>
      <!-- Facebook -->
      <a href="#" class="btn-social" title="Facebook">
        <svg viewBox="0 0 24 24" fill="#1877F2">
          <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
        </svg>
      </a>
      <!-- X -->
      <a href="#" class="btn-social" title="X">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
      </a>
    </div>

    <div class="criar-conta">
      Não tem uma conta? <a href="account.html">Criar conta</a>
    </div>

  </div>
</div>

<script>
  function toggleSenha() {
    const input = document.getElementById('inputSenha');
    const icon  = document.getElementById('iconOlho');
    const btn   = icon.closest('.btn-olho');

    if (input.type === 'password') {
      input.type = 'text';
      btn.setAttribute('aria-label', 'Ocultar senha');
      icon.innerHTML = `
        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
        <path d="m2.71 2.71 18.58 18.58"/>
        <circle cx="12" cy="12" r="3"/>
      `;
    } else {
      input.type = 'password';
      btn.setAttribute('aria-label', 'Mostrar senha');
      icon.innerHTML = `
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      `;
    }
  }
</script>

</body>
</html>
